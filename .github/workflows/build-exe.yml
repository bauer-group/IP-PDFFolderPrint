# =============================================================================
# Build Windows EXE Workflow
# =============================================================================
# Triggers:
#   - After the Release workflow completes successfully
#   - Manual dispatch with tag input
#
# Builds a standalone Windows EXE using PyInstaller and uploads it
# as a release asset to the latest release.
#
# Note: Uses workflow_run instead of release event because releases
# created by GITHUB_TOKEN don't trigger further workflows.
# =============================================================================

name: 🔨 Build Windows EXE

on:
  workflow_run:
    workflows: ['🚀 Release']
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach the EXE to (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-exe:
    name: 🔨 Build & Upload EXE
    runs-on: windows-latest
    timeout-minutes: 15
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: 🏷️ Determine Release Tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            TAG=$(gh release view --repo "${{ github.repository }}" --json tagName -q '.tagName')
            if [ -z "$TAG" ]; then
              echo "❌ No release found"
              exit 1
            fi
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "📦 Latest release: $TAG"
          fi

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: 🔨 Build EXE
        shell: bash
        run: python build.py

      - name: 📤 Upload EXE to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          EXE_PATH="dist/pdf_folder_print.exe"

          if [ ! -f "$EXE_PATH" ]; then
            echo "❌ EXE not found at $EXE_PATH"
            exit 1
          fi

          SIZE_MB=$(du -m "$EXE_PATH" | cut -f1)
          echo "📦 Uploading pdf_folder_print.exe (${SIZE_MB} MB) to release ${TAG}"

          gh release upload "$TAG" "$EXE_PATH" --clobber
